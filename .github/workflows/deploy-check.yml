name: Deploy Smoke Test

# Verifies the live deployment is healthy. Runs on demand and on a schedule.
# On failure, the run surfaces the rollback command (see README Rollback Runbook).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check app is reachable
        run: |
          URL="${{ vars.APP_URL }}"
          if [ -z "$URL" ]; then echo "APP_URL var not set; skipping"; exit 0; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "App $URL -> $code"
          test "$code" = "200"

      - name: Check API health endpoint
        run: |
          BASE="${{ vars.SUPABASE_URL }}"
          if [ -z "$BASE" ]; then echo "SUPABASE_URL var not set; skipping"; exit 0; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/functions/v1/health")
          echo "health -> $code"
          test "$code" = "200"

      - name: On failure, print rollback hint
        if: failure()
        run: |
          echo "::error::Smoke test failed. Roll back: 'vercel rollback' (promote previous deployment)."
          echo "See README → Rollback Runbook."
